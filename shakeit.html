<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>Kugel-Simulation</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      touch-action: none;
      overscroll-behavior: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #050505;
    }
  </style>
</head>
<body>
  <canvas id="world"></canvas>

  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('world');
      const ctx = canvas.getContext('2d', { alpha: false });

      const BALL_COUNT = 10000;
      const DPR_LIMIT = 2;
      const RADIUS = 1.9;
      const BASE_GRAVITY = 2350;
      const FRICTION = 0.993;
      const WALL_BOUNCE = 0.45;
      const SHAKE_THRESHOLD = 13;

      let dpr = 1;
      let width = 1;
      let height = 1;
      let lastTime = performance.now();
      let sensorsStarted = false;

      const x = new Float32Array(BALL_COUNT);
      const y = new Float32Array(BALL_COUNT);
      const vx = new Float32Array(BALL_COUNT);
      const vy = new Float32Array(BALL_COUNT);
      const color = new Array(BALL_COUNT);

      const gravity = { x: 0, y: BASE_GRAVITY };
      const lastAcceleration = { x: 0, y: 0, z: 0 };

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, DPR_LIMIT);
        width = Math.max(1, window.innerWidth);
        height = Math.max(1, window.innerHeight);

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function randomColor(index) {
        const hue = (index * 137.508 + Math.random() * 28) % 360;
        const saturation = 72 + Math.random() * 24;
        const lightness = 52 + Math.random() * 18;
        return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
      }

      function seedBalls() {
        for (let i = 0; i < BALL_COUNT; i++) {
          x[i] = RADIUS + Math.random() * Math.max(1, width - RADIUS * 2);
          y[i] = RADIUS + Math.random() * Math.max(1, height - RADIUS * 2);
          vx[i] = (Math.random() - 0.5) * 120;
          vy[i] = (Math.random() - 0.5) * 120;
          color[i] = randomColor(i);
        }
      }

      function applyImpulse(strength) {
        for (let i = 0; i < BALL_COUNT; i++) {
          vx[i] += (Math.random() - 0.5) * strength;
          vy[i] += (Math.random() - 0.5) * strength;
        }
      }

      function updateGravityFromOrientation(event) {
        const beta = event.beta || 0;
        const gamma = event.gamma || 0;

        gravity.x = Math.max(-1, Math.min(1, gamma / 45)) * BASE_GRAVITY;
        gravity.y = Math.max(-1, Math.min(1, beta / 45)) * BASE_GRAVITY;
      }

      function updateShakeFromMotion(event) {
        const a = event.accelerationIncludingGravity;
        if (!a) return;

        const ax = a.x || 0;
        const ay = a.y || 0;
        const az = a.z || 0;

        const dx = ax - lastAcceleration.x;
        const dy = ay - lastAcceleration.y;
        const dz = az - lastAcceleration.z;
        const delta = Math.sqrt(dx * dx + dy * dy + dz * dz);

        lastAcceleration.x = ax;
        lastAcceleration.y = ay;
        lastAcceleration.z = az;

        if (delta > SHAKE_THRESHOLD) {
          applyImpulse(Math.min(2100, delta * 100));
        }
      }

      async function startSensors() {
        if (sensorsStarted) return;
        sensorsStarted = true;

        try {
          if (
            typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function'
          ) {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission !== 'granted') return;
          }

          if (
            typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function'
          ) {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission !== 'granted') return;
          }

          window.addEventListener('deviceorientation', updateGravityFromOrientation, true);
          window.addEventListener('devicemotion', updateShakeFromMotion, true);
        } catch (error) {
          sensorsStarted = false;
        }
      }

      function fallbackGravityFromTouch(event) {
        if (event.touches && event.touches.length > 0) {
          const touch = event.touches[0];
          const px = touch.clientX / Math.max(1, width) - 0.5;
          const py = touch.clientY / Math.max(1, height) - 0.5;
          gravity.x = px * BASE_GRAVITY * 2;
          gravity.y = py * BASE_GRAVITY * 2;
        }
      }

      function simulate(dt) {
        const minX = RADIUS;
        const minY = RADIUS;
        const maxX = width - RADIUS;
        const maxY = height - RADIUS;

        for (let i = 0; i < BALL_COUNT; i++) {
          vx[i] = (vx[i] + gravity.x * dt) * FRICTION;
          vy[i] = (vy[i] + gravity.y * dt) * FRICTION;

          x[i] += vx[i] * dt;
          y[i] += vy[i] * dt;

          if (x[i] < minX) {
            x[i] = minX;
            vx[i] = Math.abs(vx[i]) * WALL_BOUNCE;
          } else if (x[i] > maxX) {
            x[i] = maxX;
            vx[i] = -Math.abs(vx[i]) * WALL_BOUNCE;
          }

          if (y[i] < minY) {
            y[i] = minY;
            vy[i] = Math.abs(vy[i]) * WALL_BOUNCE;
          } else if (y[i] > maxY) {
            y[i] = maxY;
            vy[i] = -Math.abs(vy[i]) * WALL_BOUNCE;
          }
        }
      }

      function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);

        for (let i = 0; i < BALL_COUNT; i++) {
          ctx.beginPath();
          ctx.arc(x[i], y[i], RADIUS, 0, Math.PI * 2);
          ctx.fillStyle = color[i];
          ctx.fill();
        }
      }

      function frame(now) {
        const dt = Math.min(0.033, Math.max(0.001, (now - lastTime) / 1000));
        lastTime = now;

        simulate(dt);
        draw();

        requestAnimationFrame(frame);
      }

      window.addEventListener('resize', () => {
        resize();
        for (let i = 0; i < BALL_COUNT; i++) {
          x[i] = Math.max(RADIUS, Math.min(width - RADIUS, x[i]));
          y[i] = Math.max(RADIUS, Math.min(height - RADIUS, y[i]));
        }
      });

      window.addEventListener('touchstart', event => {
        startSensors();
        fallbackGravityFromTouch(event);
        applyImpulse(550);
      }, { passive: true });

      window.addEventListener('touchmove', fallbackGravityFromTouch, { passive: true });

      window.addEventListener('pointerdown', () => {
        startSensors();
        applyImpulse(550);
      }, { passive: true });

      resize();
      seedBalls();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
